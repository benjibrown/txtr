# txtr default config
# this file is copied to ~/.config/txtr/config.toml on first run
# edit that file to customise - this one is just the fallback
#
# TODO: some options below are not yet implemented and are marked as [wip]

[editor]
# show line numbers relative to cursor (nvim style) [wip]
relative_numbers = false


# number of spaces for tab indent - TODO stop hardcoding 4
tab_width = 4

# auto close brackets and braces [wip]
auto_pairs = true

# use system clipboard for yank/paste (wl-copy/xclip/xsel/pbcopy)
# false = use txtr internal register only
system_clipboard = false

# when true, dd/d (delete) never yanks - use p to paste last explicit yank only
# "_dd always deletes to blackhole regardless of this setting
blackhole_delete = false

# show indent guide bars at each tab stop within leading whitespace
indent_guides = true

wrap = true

[compiler]

# compiler to use: "latexmk" is the default, "latexmk-lua", "latexmk-xe", "pdflatex", "xelatex", "lualatex" or "tectonic" are all supported / builtin 
# recommended to use the latexmk variants as they directly allow for custom aux directories 
# use :engines to see all available ones 
engine = "latexmk"

# directory for aux files/log files - relative to file dir (can be absolute too)
aux_dir = ".aux"

# if this is not empty, this command is used instead of the engine above 
custom_cmd = ""

# autocompilation config - 3 modes:
# "save" - whenever the file is saved, the latex is compiled however you must manually build it once in order to start the auto-compilation
# "always" - whenever the file is saved, the latex is compiled to pdf, you do not need to prime the compiler like in save mode
# "off" - zero autocompilation enabled 
autocompile = "off"

# only opens the build log if an error actually occurs
build_log_autohide = false
 
# automatically close the build log in the event that the compilation is successful
build_log_autoclose = false

# interval for build watch to check your file for changes (in seconds) and recompile - lower time = more responsive compilation but higher resource usage 
watch_interval = 5

[theme]
# built-in themes: catppuccin, gruvbox
name = "catppuccin"

# for custom themes: set name = "custom" and provide a path to your theme toml file
# custom theme toml format (flat, all fields required):
#   name = "my-theme"
#   bg = "#1a1b26"
#   bg_alt = "#16161e"
#   bg_popup = "#1f2335"
#   cursor_line = "#1e2030"
#   bg_sel = "#2d3f76"
#   bg_search = "#ffc777"
#   border = "#3b4261"
#   fg = "#c0caf5"
#   fg_dim = "#565f89"
#   fg_muted = "#545c7e"
#   fg_sub = "#9aa5ce"
#   accent = "#7aa2f7"
#   accent2 = "#bb9af7"
#   green = "#9ece6a"
#   yellow = "#e0af68"
#   orange = "#ff9e64"
#   red = "#f7768e"
custom_path = ""


[statusbar]
# show word count in statusbar [wip] - wil add as a demo plugin 
show_wordcount = false

# show column number
show_col = true 

# show current mode
show_mode = true




[citations]
# extra .bib file paths or directories to scan (in addition to current file's directory)
# bib_files = ["/path/to/refs.bib"]
bib_files = []

[plugins]
# plugins to load on startup (list of plugin names)
# builtin plugins live in texitor/core/builtins/
# user plugins live in ~/.config/txtr/plugins/
# example: enabled = ["wordcount"]
enabled = []

# when true, check the registry on startup and update installed user plugins
auto_update = false
